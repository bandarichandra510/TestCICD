name: Python CI/CD Pipeline

on:
  workflow_dispatch:   # manual trigger
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m unittest discover || echo "No tests found"

  promote-to-dev:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Ensure dev branch exists and update
        run: |
          git fetch origin
          if ! git ls-remote --exit-code origin dev; then
            git checkout -b dev
            git push origin dev
          else
            git checkout -B dev origin/dev
            git merge main --no-ff
            git push origin dev
          fi

  promote-to-prod:
    needs: promote-to-dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Ensure prod branch exists and update
        run: |
          git fetch origin
          if ! git ls-remote --exit-code origin prod; then
            git checkout -b prod
            git push origin prod
          else
            git checkout -B prod origin/prod
            git merge dev --no-ff
            git push origin prod
          fi
